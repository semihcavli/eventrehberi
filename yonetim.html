<style>
/* ---- Destek Talepleri ek stiller ---- */
.hbm-support-filters { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.hbm-support-filter-tab { padding:0.4rem 0.9rem; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:0.8125rem; font-weight:500; transition:all .15s; }
.hbm-support-filter-tab:hover { border-color:#1F4D33; color:#1F4D33; }
.hbm-support-filter-tab.active { background:#1F4D33; color:#fff; border-color:#1F4D33; }

.hbm-priority-badge { display:inline-block; font-size:0.6875rem; font-weight:600; padding:2px 8px; border-radius:10px; margin-left:6px; }
.hbm-priority-badge--dusuk { background:#E8F5E9; color:#2E7D32; }
.hbm-priority-badge--normal { background:#E3F2FD; color:#1565C0; }
.hbm-priority-badge--yuksek { background:#FFF3E0; color:#E65100; }

.hbm-durum-badge { display:inline-block; font-size:0.6875rem; font-weight:600; padding:2px 8px; border-radius:10px; margin-left:6px; }
.hbm-durum-badge--beklemede { background:#FFF8E1; color:#F57F17; }
.hbm-durum-badge--cevaplandi { background:#E3F2FD; color:#1565C0; }
.hbm-durum-badge--cozuldu { background:#E8F5E9; color:#2E7D32; }
.hbm-durum-badge--kapatildi { background:#F5F5F5; color:#757575; }

.hbm-support-actions { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid #f0f0f0; }

.hbm-select-sm { padding:4px 8px; border-radius:6px; border:1px solid #ddd; font-size:0.8125rem; background:#fff; cursor:pointer; }
.hbm-select-sm:focus { outline:none; border-color:#1F4D33; }

.hbm-reply-area { margin-top:0.75rem; }
.hbm-reply-textarea { width:100%; min-height:80px; padding:0.6rem 0.75rem; border:1px solid #ddd; border-radius:8px; font-size:0.875rem; font-family:inherit; resize:vertical; box-sizing:border-box; }
.hbm-reply-textarea:focus { outline:none; border-color:#1F4D33; }
.hbm-reply-actions { display:flex; gap:0.5rem; margin-top:0.5rem; justify-content:flex-end; }

.hbm-btn-delete { background:none; border:1px solid #E57373; color:#C62828; padding:4px 10px; border-radius:6px; font-size:0.8125rem; cursor:pointer; font-weight:500; transition:all .15s; }
.hbm-btn-delete:hover { background:#FFEBEE; }

.hbm-btn-reply { background:none; border:1px solid #1F4D33; color:#1F4D33; padding:4px 10px; border-radius:6px; font-size:0.8125rem; cursor:pointer; font-weight:500; transition:all .15s; }
.hbm-btn-reply:hover { background:#E8F5E9; }

.hbm-btn-send { background:#1F4D33; border:none; color:#fff; padding:6px 16px; border-radius:6px; font-size:0.8125rem; cursor:pointer; font-weight:600; transition:all .15s; }
.hbm-btn-send:hover { background:#163d28; }
.hbm-btn-send:disabled { opacity:0.5; cursor:not-allowed; }

.hbm-reply-history { margin-top:0.5rem; padding:0.5rem 0.75rem; background:#f0faf4; border-left:3px solid #1F4D33; border-radius:0 6px 6px 0; font-size:0.8125rem; }
.hbm-reply-history strong { font-size:0.75rem; color:#1F4D33; }
.hbm-reply-history p { margin:4px 0 0; color:#333; }
.hbm-reply-history-date { font-size:0.6875rem; color:#888; margin-top:2px; }

.hbm-confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999; }
.hbm-confirm-box { background:#fff; border-radius:12px; padding:1.5rem; max-width:360px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
.hbm-confirm-box h4 { margin:0 0 0.5rem; color:#C62828; }
.hbm-confirm-box p { margin:0 0 1rem; font-size:0.875rem; color:#555; }
.hbm-confirm-actions { display:flex; gap:0.5rem; justify-content:flex-end; }

.admin-belge-box { background:#FAF8F3; border:1px solid #ECE5D8; border-radius:10px; padding:0.75rem 0.875rem; margin-bottom:0.75rem; }
.admin-belge-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:0.5rem; }
.admin-belge-label { display:inline-flex; align-items:center; gap:5px; font-size:0.8125rem; color:#5a5a52; }
.admin-belge-verified { font-size:0.75rem; font-weight:600; color:#1D9E75; background:#E6F7F0; padding:2px 8px; border-radius:999px; }
.admin-belge-pending { font-size:0.75rem; font-weight:500; color:#A06000; background:#FFF8E8; padding:2px 8px; border-radius:999px; }
.admin-belge-none { font-size:0.75rem; color:#999; }
.admin-belge-list { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:0.5rem; }
.admin-belge-link { display:inline-flex; align-items:center; gap:4px; font-size:0.75rem; background:#fff; border:1px solid #DDD6C8; color:#1F4D33; padding:4px 10px; border-radius:7px; cursor:pointer; }
.admin-belge-link:hover { border-color:#1F4D33; background:#F0F7F2; }
.admin-belge-verify-btn { display:inline-flex; align-items:center; gap:5px; font-size:0.8125rem; font-weight:500; background:#1D9E75; color:#fff; border:none; padding:6px 14px; border-radius:8px; cursor:pointer; }
.admin-belge-verify-btn:hover { background:#178A65; }

.admin-btn-suspend, .admin-btn-delete, .admin-btn-view {
  display:inline-flex; align-items:center; gap:5px; font-size:0.8125rem; font-weight:500;
  padding:7px 13px; border-radius:8px; cursor:pointer; border:1px solid transparent; text-decoration:none;
}
.admin-btn-suspend { background:#FFF4EC; color:#C7522A; border-color:#F3D5C4; }
.admin-btn-suspend:hover { background:#FBEAE2; }
.admin-btn-delete { background:#FDECEC; color:#C0392B; border-color:#F5C6C6; }
.admin-btn-delete:hover { background:#FBDADA; }
.admin-btn-view { background:#F0F4F2; color:#1F4D33; border-color:#D6E2DB; }
.admin-btn-view:hover { background:#E4EDE8; }

.admin-stat-chip.amber { background:#FFF8E8; color:#A06000; }
.admin-stat-chip.teal { background:#E6F7F0; color:#1D9E75; }
</style>

<script>
/* =====================================================
   Admin panel — yonetim.html
   ===================================================== */
const ADMIN_EMAILS = ['rertovi@gmail.com', 'info@eventrehberi.com', 'semihcavli@gmail.com'];
const HIZMET_LBL = {
  yemek:'Yemek Catering', bar:'Bar & Kokteyl', sef:'Özel Şef',
  pasta:'Pasta & Tatlı', susleme:'Süsleme & Dekor', cicek:'Çiçek',
  davetiye:'Davetiye Tasarımı', organizator:'Organizatör',
  dj:'DJ & Müzik', foto:'Foto & Video', garson:'Garson Servisi',
  hostes:'Hostes', ekipman:'Ekipman Kiralama'
};
const BELGE_LBL = { vergi_levhasi:'Vergi levhası', kimlik:'Kimlik/Sirküler', sertifika:'Sertifika/Ruhsat', portfolyo:'Portfolyo' };
const SEGMENT_MAP = { 'Ekonomik':1, 'Orta':2, 'Orta-üst':3, 'Premium':4 };

const DURUM_LBL   = { beklemede:'Beklemede', cevaplandi:'Cevaplandı', cozuldu:'Çözüldü', kapatildi:'Kapatıldı' };
const ONCELIK_LBL = { dusuk:'Düşük', normal:'Normal', yuksek:'Yüksek' };

let currentStatus = 'pending';
let currentContactStatus = 'all';
let allApplications = [];
let allContactRequests = [];
let adminUser = null;

/* ---- slugify ---- */
function slugify(str) {
  return (str || '').toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');
}

/* ---- toast ---- */
function showToast(msg, isError) {
  const t = document.getElementById('admin-toast');
  t.textContent = msg;
  t.className = 'admin-toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ---- fetch & render ---- */
async function loadApplications() {
  const { data, error } = await ER_Supabase
    .from('firm_applications')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { showToast('Başvurular yüklenemedi: ' + error.message, true); return; }
  allApplications = data || [];
  renderStats();
  applyFiltersAndRender();
}

function renderStats() {
  const pending  = allApplications.filter(a => a.status === 'pending').length;
  const approved = allApplications.filter(a => a.status === 'approved').length;
  const rejected = allApplications.filter(a => a.status === 'rejected').length;
  const dogrulanmis = allApplications.filter(a => a.dogrulanmis).length;
  const total = allApplications.length;
  // Son 7 gün
  const haftaOnce = Date.now() - 7*24*60*60*1000;
  const buHafta = allApplications.filter(a => a.created_at && new Date(a.created_at).getTime() > haftaOnce).length;
  document.getElementById('admin-stats-bar').innerHTML = [
    `<span class="admin-stat-chip">Toplam: ${total}</span>`,
    `<span class="admin-stat-chip amber">Beklemede: ${pending}</span>`,
    `<span class="admin-stat-chip green">Onaylı: ${approved}</span>`,
    `<span class="admin-stat-chip red">Reddedildi: ${rejected}</span>`,
    `<span class="admin-stat-chip teal">Doğrulanmış: ${dogrulanmis}</span>`,
    `<span class="admin-stat-chip">Bu hafta: ${buHafta}</span>`,
  ].join('');
}

function applyFiltersAndRender() {
  const hizmet = document.getElementById('filter-hizmet').value;
  const city   = document.getElementById('filter-city').value.toLowerCase().trim();
  const search = (document.getElementById('filter-search')?.value || '').toLowerCase().trim();

  let filtered = allApplications;
  if (currentStatus !== 'all') filtered = filtered.filter(a => a.status === currentStatus);
  if (hizmet) filtered = filtered.filter(a => (a.hizmet || []).includes(hizmet));
  if (city)   filtered = filtered.filter(a => (a.city || '').toLowerCase().includes(city));
  if (search) filtered = filtered.filter(a => (a.firm_name || '').toLowerCase().includes(search));

  const container = document.getElementById('admin-cards');
  if (!filtered.length) {
    container.innerHTML = '<p style="color:var(--color-text-muted);padding:2rem 0;">Başvuru bulunamadı.</p>';
    return;
  }
  container.innerHTML = filtered.map(renderCard).join('');
  bindCardEvents();
}

function renderCard(app) {
  const date   = new Date(app.created_at).toLocaleDateString('tr-TR');
  const hizmet = (app.hizmet || [])[0];
  const photos = app.photos || [];
  const desc   = app.description || '';

  return `
  <div class="admin-card" data-id="${app.id}">
    <div class="admin-card-head">
      <div>
        <h3 class="admin-card-name">${esc(app.firm_name || '—')}
          <span class="admin-status-badge ${app.status}">${statusLabel(app.status)}</span>
          ${app.paket === 'Pro' ? '<span class="admin-status-badge" style="background:#FFF8E8;color:#A06000;border:1px solid #F0D890;margin-left:4px;">Pro</span>' : ''}
        </h3>
      </div>
      <span class="admin-card-date">${date}</span>
    </div>

    <div class="admin-card-meta">
      ${hizmet ? `<span class="admin-meta-item"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${HIZMET_LBL[hizmet] || hizmet}</span>` : ''}
      ${app.city ? `<span class="admin-meta-item"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(app.city)}</span>` : ''}
      ${app.phone ? `<span class="admin-meta-item"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.29 6.29l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${esc(app.phone)}</span>` : ''}
      ${app.email ? `<span class="admin-meta-item"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${esc(app.email)}</span>` : ''}
      ${app.segment ? `<span class="admin-meta-item">Segment: ${esc(app.segment)}</span>` : ''}
    </div>

    ${desc ? `<div class="admin-card-desc" id="desc-${app.id}">${esc(desc)}</div>
    <button type="button" class="admin-desc-toggle" data-desc="${app.id}">Daha fazla göster</button>` : ''}

    ${photos.length ? `<div class="admin-card-photos">${photos.map(url =>
      `<img class="admin-photo-thumb" src="${esc(url)}" alt="Firma fotoğrafı" loading="lazy" onclick="window.open('${esc(url)}','_blank')">`
    ).join('')}</div>` : ''}

    <div class="admin-belge-box">
      <div class="admin-belge-head">
        <span class="admin-belge-label">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          ${app.firma_turu === 'sirket' ? 'Şirket' : app.firma_turu === 'bireysel' ? 'Bireysel' : 'Tür belirtilmemiş'}
          ${app.vergi_no ? ` · VKN: ${esc(app.vergi_no)}` : ''}
        </span>
        ${app.dogrulanmis ? '<span class="admin-belge-verified">✓ Doğrulanmış</span>' : (app.belgeler && app.belgeler.length ? '<span class="admin-belge-pending">Belge bekliyor</span>' : '<span class="admin-belge-none">Belge yok</span>')}
      </div>
      ${(app.belgeler && app.belgeler.length) ? `<div class="admin-belge-list">${app.belgeler.map(b =>
        `<button type="button" class="admin-belge-link" data-belge-path="${esc(b.path)}">${BELGE_LBL[b.tur] || b.tur} <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>`
      ).join('')}</div>` : ''}

        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg> Belgeleri doğrula
      </button>` : ''}
    </div>

    ${app.rejection_reason ? `<div style="font-size:0.8125rem;color:#C0392B;background:#FFF0F0;border:1px solid #F5B7B1;border-radius:8px;padding:0.5rem 0.75rem;margin-bottom:0.75rem;">Ret sebebi: ${esc(app.rejection_reason)}</div>` : ''}

    <div class="admin-card-actions">
      ${app.status === 'pending' ? `<button type="button" class="admin-btn-approve" data-action="approve" data-id="${app.id}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Onayla
      </button>
      <button type="button" class="admin-btn-reject" data-action="reject" data-id="${app.id}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Reddet
      </button>` : ''}
      <button type="button" class="admin-btn-edit" data-action="edit" data-id="${app.id}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Düzenle
      </button>
      ${app.status === 'approved' ? `<button type="button" class="admin-btn-suspend" data-action="suspend" data-id="${app.id}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>
        Yayından kaldır
      </button>
      <a class="admin-btn-view" href="firma.html?id=${slugify(app.firm_name)}-${app.id.substring(0,4)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Canlı gör
      </a>` : ''}
      ${app.status === 'rejected' || app.status === 'approved' ? `<button type="button" class="admin-btn-delete" data-action="delete" data-id="${app.id}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Sil
      </button>` : ''}
    </div>
  </div>`;
}

function statusLabel(s) {
  return { pending:'Beklemede', approved:'Onaylı', rejected:'Reddedildi' }[s] || s;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ---- bind events ---- */
function bindCardEvents() {
  document.getElementById('admin-cards').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) {
      const tog = e.target.closest('[data-desc]');
      if (tog) {
        const el = document.getElementById('desc-' + tog.dataset.desc);
        if (el) {
          el.classList.toggle('expanded');
          tog.textContent = el.classList.contains('expanded') ? 'Daha az göster' : 'Daha fazla göster';
        }
      }
      return;
    }

    const id  = btn.dataset.id;
    const app = allApplications.find(a => a.id === id);
    if (!app) return;

    if (btn.dataset.action === 'approve') approveApplication(app, btn);
    if (btn.dataset.action === 'reject')  openRejectModal(app);
    if (btn.dataset.action === 'edit')    openEditModal(app);
    if (btn.dataset.action === 'verify')  verifyBelgeler(app, btn);
    if (btn.dataset.action === 'suspend') suspendFirm(app, btn);
    if (btn.dataset.action === 'delete')  deleteFirm(app, btn);
  }, { once: false });

  // Belge linkine tıklayınca signed URL ile aç (private)
  document.getElementById('admin-cards').addEventListener('click', async function(e) {
    const link = e.target.closest('[data-belge-path]');
    if (!link) return;
    e.preventDefault();
    const path = link.dataset.belgePath;
    const { data, error } = await ER_Supabase.storage.from('firma-belgeler').createSignedUrl(path, 120);
    if (error) { showToast('Belge açılamadı: ' + error.message, true); return; }
    window.open(data.signedUrl, '_blank');
  });
}

async function verifyBelgeler(app, btn) {
  btn.disabled = true;
  btn.textContent = 'Doğrulanıyor…';
  const { error } = await ER_Supabase.from('firm_applications')
    .update({ dogrulanmis: true, belge_durumu: 'onayli' })
    .eq('id', app.id);
  if (error) { showToast('Hata: ' + error.message, true); btn.disabled = false; return; }
  // Eğer firma zaten firms tablosunda ise oradaki dogrulanmis'i de güncelle
  if (app.user_id) {
    await ER_Supabase.from('firms').update({ dogrulanmis: true }).eq('user_id', app.user_id);
  }
  showToast('Belgeler doğrulandı ✓ Firma artık "Doğrulanmış" rozeti alacak.');
  loadApplications();
}

async function suspendFirm(app, btn) {
  if (!confirm(`"${app.firm_name}" firmasını yayından kaldırmak istiyor musun?\n\nFirma listede görünmeyecek ama verisi silinmez — sonra tekrar yayınlayabilirsin.`)) return;
  btn.disabled = true;
  btn.textContent = 'Kaldırılıyor…';
  const firmId = slugify(app.firm_name) + '-' + app.id.substring(0, 4);
  // firms tablosunda gizle (approved=false)
  const { error: fErr } = await ER_Supabase.from('firms').update({ approved: false }).eq('id', firmId);
  // başvuru durumunu 'pending'e çek (tekrar onaylanabilsin)
  const { error: aErr } = await ER_Supabase.from('firm_applications').update({ status: 'pending' }).eq('id', app.id);
  if (fErr || aErr) { showToast('Hata: ' + ((fErr||aErr).message), true); btn.disabled = false; btn.textContent = 'Yayından kaldır'; return; }
  // DOĞRULA: firms gerçekten gizlendi mi?
  const { data: chk } = await ER_Supabase.from('firms').select('approved').eq('id', firmId);
  if (chk && chk.length && chk[0].approved === true) {
    showToast('Yayından kaldırılamadı — yetki sorunu olabilir.', true);
    btn.disabled = false; btn.textContent = 'Yayından kaldır';
    return;
  }
  showToast('Firma yayından kaldırıldı. "Beklemede" listesine alındı.');
  loadApplications();
}

async function deleteFirm(app, btn) {
  if (!confirm(`"${app.firm_name}" firmasını KALICI olarak silmek istiyor musun?\n\nBu işlem geri alınamaz — hem firma kaydı hem başvuru tamamen silinir.`)) return;
  if (!confirm('Emin misin? Son uyarı — bu işlem GERİ ALINAMAZ.')) return;
  btn.disabled = true;
  btn.textContent = 'Siliniyor…';
  const firmId = slugify(app.firm_name) + '-' + app.id.substring(0, 4);
  // firms tablosundan sil (varsa)
  await ER_Supabase.from('firms').delete().eq('id', firmId);
  // başvuruyu sil
  const { error } = await ER_Supabase.from('firm_applications').delete().eq('id', app.id);
  if (error) { showToast('Silme hatası: ' + error.message, true); btn.disabled = false; btn.textContent = 'Sil'; return; }
  // DOĞRULA: gerçekten silindi mi? (RLS sessiz başarısızlığını yakala)
  const { data: still } = await ER_Supabase.from('firm_applications').select('id').eq('id', app.id);
  if (still && still.length) {
    showToast('Silinemedi — yetki sorunu olabilir. Değişiklik yapılmadı.', true);
    btn.disabled = false; btn.textContent = 'Sil';
    return;
  }
  showToast('Firma kalıcı olarak silindi.');
  loadApplications();
}

/* ---- approve ---- */
async function approveApplication(app, btn) {
  btn.disabled = true;
  btn.textContent = 'Onaylanıyor…';

  const firmId = slugify(app.firm_name) + '-' + app.id.substring(0, 4);
  const firmRow = {
    id:         firmId,
    name:       app.firm_name,
    hizmet:     (app.hizmet || [])[0] || null,
    city:       app.city,
    district:   app.district || null,
    phone:      app.phone || null,
    tagline:    (app.description || '').substring(0, 120),
    events:     app.etkinlik  || [],
    cuisine:    app.mutfak    || [],
    price:      SEGMENT_MAP[app.segment] || 2,
    min_people: app.min_kisi  || 0,
    max_people: app.max_kisi  || null,
    min_adet:      app.min_adet      || null,
    sure:          app.sure          || null,
    ekipman_dahil: app.ekipman_dahil || null,
    teslim_suresi: app.teslim_suresi || null,
    yas_grubu:     app.yas_grubu     || null,
    ek_hizmetler:  app.ek_hizmetler  || null,
    proje_tipi:    app.proje_tipi    || null,
    ozel_diyet:    app.ozel_diyet    || null,
    image:      (app.photos   || [])[0] || null,
    badge:      app.paket === 'Pro' ? 'Pro' : null,
    approved:   true,
    rating:     0,
    reviews:    0,
    user_id:    app.user_id || null,
  };

  const { error: fErr } = await ER_Supabase.from('firms').upsert(firmRow, { onConflict: 'id' });
  if (fErr) {
    showToast('Firma eklenemedi: ' + fErr.message, true);
    btn.disabled = false;
    btn.textContent = 'Onayla';
    return;
  }

  const { error: aErr } = await ER_Supabase.from('firm_applications')
    .update({ status: 'approved', reviewed_at: new Date().toISOString(), reviewed_by: adminUser?.id })
    .eq('id', app.id);
  if (aErr) showToast('Durum güncellenemedi: ' + aErr.message, true);
  else showToast('Firma yayınlandı ✓');

  loadApplications();
}

document.getElementById('contact-filter-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.hbm-support-filter-tab');
  if (!btn) return;
  document.querySelectorAll('.hbm-support-filter-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  renderContactCards();

/* ---- badge ---- */
async function loadContactBadge() {
  var result = await ER_Supabase
    .from('contact_requests')
    .select('*', { count: 'exact', head: true })
    .or('durum.is.null,durum.eq.beklemede');
  var badge = document.getElementById('contact-unread-badge');
  if (!badge) return;
  var count = result.count || 0;
  badge.textContent = count;
  badge.hidden = !(count > 0);
}

/* ---- load ---- */
async function loadContactRequests() {
  var body = document.getElementById('contact-cards');
  body.innerHTML = '<p style="color:var(--color-text-muted);padding:2rem 0;">Yükleniyor…</p>';

  var result = await ER_Supabase
    .from('contact_requests')
    .select('*')
    .order('created_at', { ascending: false });

  if (result.error) {
    body.innerHTML = '<p style="padding:2rem 0;color:#C0392B;">Hata: ' + esc(result.error.message) + '</p>';
    return;
  }
  allContactRequests = result.data || [];
  renderContactCards();
}

/* ---- render filtered ---- */
function renderContactCards() {
  var filtered = allContactRequests;
  if (currentContactStatus !== 'all') {
    filtered = filtered.filter(function(r) {
      var durum = r.durum || 'beklemede';
      return durum === currentContactStatus;
    });
  }

  var body = document.getElementById('contact-cards');
  if (!filtered.length) {
    body.innerHTML = '<p style="color:var(--color-text-muted);padding:2rem 0;text-align:center;">Bu durumda mesaj yok.</p>';
    return;
  }
  body.innerHTML = '<div class="hbm-support-list">' + filtered.map(renderContactCard).join('') + '</div>';
}

/* ---- render single card ---- */
function renderContactCard(r) {
  var date = new Date(r.created_at).toLocaleDateString('tr-TR', {
    day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  var durum   = r.durum || 'beklemede';
  var oncelik = r.oncelik || 'normal';

  var durumHtml   = '<span class="hbm-durum-badge hbm-durum-badge--' + durum + '">' + (DURUM_LBL[durum] || durum) + '</span>';
  var oncelikHtml = '<span class="hbm-priority-badge hbm-priority-badge--' + oncelik + '">' + (ONCELIK_LBL[oncelik] || oncelik) + '</span>';

  var replyHtml = '';
  if (r.cevap) {
    var cevapTarih = r.cevap_tarihi ? new Date(r.cevap_tarihi).toLocaleDateString('tr-TR', {
      day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    }) : '';
    replyHtml = '<div class="hbm-reply-history">'
      + '<strong>Gönderilen Cevap:</strong>'
      + '<p>' + esc(r.cevap) + '</p>'
      + (cevapTarih ? '<div class="hbm-reply-history-date">' + cevapTarih + '</div>' : '')
      + '</div>';
  }

  return '<div class="hbm-support-card" id="contact-req-' + r.id + '">'
    + '<div class="hbm-support-head">'
    + '<div>'
    + '<strong>' + esc(r.ad || '') + '</strong>'
    + durumHtml + oncelikHtml
    + '<br><span class="hbm-support-email">' + esc(r.email || '') + '</span>'
    + (r.konu ? '<span class="hbm-support-konu">' + esc(r.konu) + '</span>' : '')
    + '</div>'
    + '<div class="hbm-support-meta">'
    + '<span class="hbm-support-date">' + date + '</span>'
    + '</div>'
    + '</div>'
    + '<p class="hbm-support-msg">' + esc(r.mesaj || '') + '</p>'
    + replyHtml
    + '<div class="hbm-support-actions">'
    + '<label style="font-size:0.8125rem;font-weight:500;">Durum:</label>'
    + '<select class="hbm-select-sm" data-durum-id="' + r.id + '">'
    + '<option value="beklemede"'  + (durum === 'beklemede'  ? ' selected' : '') + '>Beklemede</option>'
    + '<option value="cevaplandi"' + (durum === 'cevaplandi' ? ' selected' : '') + '>Cevaplandı</option>'
    + '<option value="cozuldu"'    + (durum === 'cozuldu'    ? ' selected' : '') + '>Çözüldü</option>'
    + '<option value="kapatildi"'  + (durum === 'kapatildi'  ? ' selected' : '') + '>Kapatıldı</option>'
    + '</select>'
    + '<label style="font-size:0.8125rem;font-weight:500;margin-left:8px;">Öncelik:</label>'
    + '<select class="hbm-select-sm" data-oncelik-id="' + r.id + '">'
    + '<option value="dusuk"'  + (oncelik === 'dusuk'  ? ' selected' : '') + '>Düşük</option>'
    + '<option value="normal"' + (oncelik === 'normal' ? ' selected' : '') + '>Normal</option>'
    + '<option value="yuksek"' + (oncelik === 'yuksek' ? ' selected' : '') + '>Yüksek</option>'
    + '</select>'
    + '<button class="hbm-btn-reply" type="button" data-reply-toggle="' + r.id + '">Cevap Yaz</button>'
    + '<button class="hbm-btn-delete" type="button" data-delete-id="' + r.id + '">Sil</button>'
    + '</div>'
    + '<div class="hbm-reply-area" id="reply-area-' + r.id + '" hidden>'
    + '<textarea class="hbm-reply-textarea" id="reply-text-' + r.id + '" placeholder="Cevabınızı yazın... (kullanıcıya e-posta olarak gönderilecek)"></textarea>'
    + '<div class="hbm-reply-actions">'
    + '<button class="btn btn-ghost btn-sm" type="button" data-reply-cancel="' + r.id + '">İptal</button>'
    + '<button class="hbm-btn-send" type="button" data-reply-send="' + r.id + '" data-email="' + esc(r.email || '') + '">Gönder</button>'
    + '</div>'
    + '</div>'
    + '</div>';
}

/* ---- contact events (delegated) ---- */
document.getElementById('section-contact').addEventListener('click', function(e) {
  var toggleBtn = e.target.closest('[data-reply-toggle]');
  if (toggleBtn) {
    var area = document.getElementById('reply-area-' + toggleBtn.dataset.replyToggle);
    if (area) area.hidden = !area.hidden;
    return;
  }

  var cancelBtn = e.target.closest('[data-reply-cancel]');
  if (cancelBtn) {
    var area2 = document.getElementById('reply-area-' + cancelBtn.dataset.replyCancel);
    if (area2) area2.hidden = true;
    return;
  }

  var sendBtn = e.target.closest('[data-reply-send]');
  if (sendBtn) {
    handleReplySend(sendBtn);
    return;
  }

  var delBtn = e.target.closest('[data-delete-id]');
  if (delBtn) {
    showDeleteConfirm(delBtn.dataset.deleteId);
    return;
  }
});

/* ---- durum & oncelik change ---- */
document.getElementById('section-contact').addEventListener('change', function(e) {
  var durumSelect = e.target.closest('[data-durum-id]');
  if (durumSelect) {
    handleDurumChange(durumSelect.dataset.durumId, durumSelect.value);
    return;
  }
  var oncelikSelect = e.target.closest('[data-oncelik-id]');
  if (oncelikSelect) {
    handleOncelikChange(oncelikSelect.dataset.oncelikId, oncelikSelect.value);
    return;
  }
});

/* ---- durum update ---- */
async function handleDurumChange(id, yeniDurum) {
  var result = await ER_Supabase.from('contact_requests').update({
    durum: yeniDurum,
    okundu: true,
    updated_at: new Date().toISOString()
  }).eq('id', id);

  if (result.error) {
    showToast('Durum güncellenemedi: ' + result.error.message, true);
    return;
  }
  showToast('Durum güncellendi: ' + (DURUM_LBL[yeniDurum] || yeniDurum));

  var req = allContactRequests.find(function(r) { return r.id === id; });
  if (req) { req.durum = yeniDurum; req.okundu = true; }
  loadContactBadge();
}

/* ---- oncelik update ---- */
async function handleOncelikChange(id, yeniOncelik) {
  var result = await ER_Supabase.from('contact_requests').update({
    oncelik: yeniOncelik,
    updated_at: new Date().toISOString()
  }).eq('id', id);

  if (result.error) {
    showToast('Öncelik güncellenemedi: ' + result.error.message, true);
    return;
  }
  showToast('Öncelik güncellendi: ' + (ONCELIK_LBL[yeniOncelik] || yeniOncelik));

  var req = allContactRequests.find(function(r) { return r.id === id; });
  if (req) req.oncelik = yeniOncelik;
}

/* ---- reply send ---- */
async function handleReplySend(btn) {
  var id    = btn.dataset.replySend;
  var email = btn.dataset.email;
  var text  = document.getElementById('reply-text-' + id).value.trim();
  if (!text) { showToast('Cevap boş olamaz', true); return; }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor…';

  try {
    /* 1) Send reply email via API */
    var resp = await fetch('/api/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, mesaj: text, talep_id: id })
    });

    if (!resp.ok) {
      var errData = await resp.json().catch(function() { return {}; });
      throw new Error(errData.hata || 'E-posta gönderilemedi');
    }

    /* 2) Update DB */
    var result = await ER_Supabase.from('contact_requests').update({
      cevap: text,
      cevaplayan: adminUser?.email || 'admin',
      cevap_tarihi: new Date().toISOString(),
      durum: 'cevaplandi',
      okundu: true,
      updated_at: new Date().toISOString()
    }).eq('id', id);

    if (result.error) throw new Error(result.error.message);

    showToast('Cevap gönderildi ✓');

    var req = allContactRequests.find(function(r) { return r.id === id; });
    if (req) {
      req.cevap = text;
      req.cevaplayan = adminUser?.email || 'admin';
      req.cevap_tarihi = new Date().toISOString();
      req.durum = 'cevaplandi';
      req.okundu = true;
    }
    renderContactCards();
    loadContactBadge();

  } catch (err) {
    showToast('Hata: ' + err.message, true);
    btn.disabled = false;
    btn.textContent = 'Gönder';
  }
}

/* ---- delete confirm ---- */
function showDeleteConfirm(id) {
  var container = document.getElementById('delete-confirm-container');
  container.innerHTML = '<div class="hbm-confirm-overlay" id="delete-overlay">'
    + '<div class="hbm-confirm-box">'
    + '<h4>Destek Talebini Sil</h4>'
    + '<p>Bu mesajı kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.</p>'
    + '<div class="hbm-confirm-actions">'
    + '<button class="btn btn-ghost btn-sm" type="button" id="delete-cancel-btn">İptal</button>'
    + '<button class="hbm-btn-delete" type="button" id="delete-confirm-btn" data-id="' + id + '" style="font-weight:600;">Evet, Sil</button>'
    + '</div>'
    + '</div>'
    + '</div>';

  document.getElementById('delete-cancel-btn').addEventListener('click', function() {
    container.innerHTML = '';
  });

  document.getElementById('delete-overlay').addEventListener('click', function(e) {
    if (e.target === this) container.innerHTML = '';
  });

  document.getElementById('delete-confirm-btn').addEventListener('click', async function() {
    this.disabled = true;
    this.textContent = 'Siliniyor…';

    var result = await ER_Supabase.from('contact_requests').delete().eq('id', id);
    container.innerHTML = '';

    if (result.error) {
      showToast('Silinemedi: ' + result.error.message, true);
      return;
    }

    showToast('Mesaj silindi');
    allContactRequests = allContactRequests.filter(function(r) { return r.id !== id; });
    renderContactCards();
    loadContactBadge();
  });
}

/* ---- boot ---- */
document.addEventListener('er-supabase-ready', async function() {
  const { data: { user } } = await ER_Supabase.auth.getUser();
  if (!user || !ADMIN_EMAILS.includes(user.email)) {
    document.getElementById('admin-wrap').innerHTML =
      '<div class="admin-unauthorized"><p>Yetkisiz erişim.</p><p style="font-size:0.875rem;">Yönlendiriliyor…</p></div>';
    setTimeout(() => window.location.href = 'hesabim.html', 2000);
    return;
  }
  adminUser = user;
  loadApplications();
  loadContactBadge();
}, { once: true });
</script>
